<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>ConsoleCraft Launcher</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

    <div id="panorama"></div>



    <div class="centered-menu">

            <img src="media/gui/textures/profile-creation.png" draggable="false" class="profile-creation-bg">

            

           <div class="bottom-section player-profile-gui">

                <p class="player-profile-text">Launch Options</p>

                
                <div class="button-wide button-medium" id="import-skin-button">
                    <p>Open Install Directory</p>
                </div>
                <p class="player-profile-text">Download URL</p>
                <input type="text" class="input-wide-g" placeholder="https://github.com/smartcmd/MinecraftConsoles/releases/download/nightly/LCEWindows64.zip"> 


                <p class="player-profile-text">Client Executable Name</p>
                <input type="text" class="input-wide-g" placeholder="Minecraft.Client.exe"> 


                <div class="button-wide button-medium" id="save-profile-button">
                    <p>Save</p>
                </div>

                <a class="button-wide button-medium" id="profile-open-button" href="index.html">
                    <p>Back</p>
                </a>


            </div>
    </div>





        
    </body>

    <script src="./index.js"></script>
    <script src="panorama.js"></script>

</html>
