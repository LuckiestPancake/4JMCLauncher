<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>ConsoleCraft Launcher</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        
        <div class="launcher-options-bottom">

            <input type="text" class="input-wide" placeholder="Player"> 

            <div class="play-section">
                <img src="media/logo-tempscaled.png" class="play-section-title" draggable="false">
                <div class="button-wide" id="play-button">
                    <p>Play</p>
                </div>
            </div>

            <div class="playtime-section">
                <p class="playtime-section-title">Playtime</p>
                <p class="playtime-section-time">32d 1h 30m</p>
            </div>

        </div>

        
    </body>

    <script src="./index.js"></script>

</html>
