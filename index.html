<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>ConsoleCraft Launcher</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

    <div id="panorama"></div>



    <div class="launcher-options-top">

            <div class="launcher-options-top-left">
                <a class="button-wide button-wide-g button-medium" id="save-profile-button">
                    <p>Instances</p>
                </a>

                <a class="button-wide button-medium" id="save-profile-button" href="options.html">
                    <p>Options</p>
                </a>
            </div>
    </div>




        
        <div class="launcher-options-bottom">

            <div class="bottom-section player-profile">


                <a class="button-wide button-medium" id="profile-open-button" href="profile.html">
                    <p>Profile</p>
                </a>
            </div>


            <div class="play-section bottom-section">
                <img src="media/logo-tempscaled.png" class="play-section-title" draggable="false">

                <div class="play-buttons">

                    <div class="button-wide" id="play-button">
                        <p>Play</p>
                    </div>

                </div>




                    
            </div>

            <div class="playtime-section">
                <p class="playtime-section-title">Release: <span class="playtime-section-time">Beta v1.0.6</span></p>
                <p class="playtime-section-title">Playtime: <span class="playtime-section-time">0h 0m</span></p>
                
            </div>

        </div>

        
    </body>

    <script src="index.js"></script>
    <script src="panorama.js"></script>

</html>
